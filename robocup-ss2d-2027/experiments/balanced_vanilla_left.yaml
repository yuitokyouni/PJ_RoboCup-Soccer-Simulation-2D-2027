schema_version: "0.1.0"

experiment_id: "balanced_vanilla_left"
description: >
  Balanced n=30 leg 1 of 2 (Vanilla on LEFT). Pair this experiment
  with balanced_spica325_left.yaml (Spica325 on LEFT) so that each
  team plays 15 matches per side. The pair tests Spica325 vs Vanilla
  while cancelling out the cross-binary side bias documented in the
  2026-06-25 session handoff (~40 pp LEFT advantage when a Cyrus-style
  binary plays a Spica-style binary across the divide).

  This leg runs Vanilla on the LEFT, Spica325 on the RIGHT.

home_team: "CYRUS_VANILLA"
away_team: "SPICA325"

home_start_command: "scripts/team_launchers/cyrus_vanilla_left.sh"
away_start_command: "scripts/team_launchers/spica325_right.sh"

num_matches: 15
timeout_secs: 600

declared_reality_assertion: "real_rcssserver"

server_options:
  - "server::synch_mode=true"
  - "server::penalty_shoot_outs=false"
  - "server::nr_extra_halfs=0"

notes:
  - "Balanced eval leg 1/2: Vanilla LEFT, Spica325 RIGHT."
  - "Pair with balanced_spica325_left.yaml (Spica325 LEFT, Vanilla RIGHT)."
  - "Aggregate via scripts/combine_balanced_legs.py --variant SPICA325."

schema_version: "0.1.0"

experiment_id: "vanilla_vs_spica325"
description: >
  Head-to-head: Vanilla (Cyrus-style baseline, F433, no Phase 5) on
  LEFT vs Spica325 (Phase 5 hooks active, variable F433/3-2-5 overlay,
  counter-press wired into bhv_block / mark, continuous chance-signal
  bias) on RIGHT.

  Note: this experiment is side-unbalanced and confounded by the
  cross-binary LEFT-side bias documented in the 2026-06-25 handoff.
  Use experiments/balanced_{vanilla,spica325}_left.yaml for
  side-balanced eval; aggregate via scripts/combine_balanced_legs.py.

home_team: "CYRUS_VANILLA"
away_team: "SPICA325"

home_start_command: "scripts/team_launchers/cyrus_vanilla_left.sh"
away_start_command: "scripts/team_launchers/spica325_right.sh"

num_matches: 30
timeout_secs: 600

declared_reality_assertion: "real_rcssserver"

server_options:
  - "server::synch_mode=true"
  # No penalty shootouts; ties in regular time are recorded as draws.
  - "server::penalty_shoot_outs=false"
  - "server::nr_extra_halfs=0"

notes:
  - "Both binaries built from cyrus-soccer-simulation-team@7283c0d. Vanilla has only the rapidjson vendor patch; Spica325 has the full Phase 5 patch set."
  - "Two separate build dirs (cyrus-team-vanilla-snapshot and cyrus-team-v3-snapshot) so each binary loads its own data/settings/Other.json."

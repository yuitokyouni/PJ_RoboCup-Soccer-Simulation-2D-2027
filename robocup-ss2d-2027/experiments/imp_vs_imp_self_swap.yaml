schema_version: "0.1.0"

experiment_id: "imp_vs_imp_self_swap"
description: >
  Phase 7 LEFT-side-bias smoking gun. Both binaries are the v3
  improved snapshot (Phase 5/6/7 patches), so any side bias must be
  internal to the patches (singleton state, FP order) rather than an
  interaction with vanilla. Two distinct team names so rcssserver can
  distinguish them; both launchers point at cyrus-team-v3-snapshot.
  Imp_LL plays LEFT and Imp_RR plays RIGHT.

home_team: "CYRUS_IMP_LL"
away_team: "CYRUS_IMP_RR"

home_start_command: "scripts/team_launchers/cyrus_improved_LL_left.sh"
away_start_command: "scripts/team_launchers/cyrus_improved_RR_left.sh"

num_matches: 10
timeout_secs: 600

declared_reality_assertion: "real_rcssserver"

server_options:
  - "server::synch_mode=true"
  - "server::penalty_shoot_outs=false"
  - "server::nr_extra_halfs=0"

notes:
  - "Decision rule: if Imp_LL win rate vs Imp_RR > 0.70 or < 0.30, the side bias is INTERNAL to my patches; bisect Phase 5/6/7 modules by disabling one at a time."
  - "If 0.30 <= win rate <= 0.70 (close to 50/50), the bias is from INTERACTION between my patches and Cyrus's existing asymmetric code (evaluate_state2, hard-coded unum checks in action_chain_graph.cpp)."
  - "Reference baselines from the handoff: vanilla self-swap LEFT 20-30% wins (no bias); helios self-swap LEFT 40% (no bias). Cross-binary cyrus showed LEFT 50% wins in decisive matches (~40pp bias)."

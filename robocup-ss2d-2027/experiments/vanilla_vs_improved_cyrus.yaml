schema_version: "0.1.0"

experiment_id: "vanilla_vs_improved_cyrus"
description: >
  Head-to-head: vanilla CYRUS_L (no Phase 5, F433) vs improved
  CYRUS_R (Phase 5 hooks active, F325-hybrid = F325 defense conf +
  F433 offense conf, counter-press wired into bhv_block / mark,
  continuous chance-signal bias).

home_team: "CYRUS_VANILLA"
away_team: "CYRUS_IMPROVED"

home_start_command: "scripts/team_launchers/cyrus_vanilla_left.sh"
away_start_command: "scripts/team_launchers/cyrus_improved_right.sh"

num_matches: 30  # F433-only Improved (chance threshold 0.5, mag 50), PK disabled
timeout_secs: 600

declared_reality_assertion: "real_rcssserver"

server_options:
  - "server::synch_mode=true"
  # No penalty shootouts; ties in regular time are recorded as draws.
  - "server::penalty_shoot_outs=false"
  - "server::nr_extra_halfs=0"

notes:
  - "Both binaries built from cyrus-soccer-simulation-team@7283c0d; vanilla has zero modifications, improved has the full Phase 5 patch set."
  - "Two separate build dirs so each binary loads its own data/settings/Other.json."

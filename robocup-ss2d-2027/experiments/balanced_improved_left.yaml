schema_version: "0.1.0"

experiment_id: "balanced_improved_left"
description: >
  Balanced n=30 leg 2 of 2 (improved on LEFT). Pair with
  balanced_vanilla_left.yaml. Combined these two legs make a
  side-balanced 30-match evaluation of improved vs vanilla.

  This leg runs improved on the LEFT, vanilla on the RIGHT.

home_team: "CYRUS_IMPROVED"
away_team: "CYRUS_VANILLA"

home_start_command: "scripts/team_launchers/cyrus_improved_left.sh"
away_start_command: "scripts/team_launchers/cyrus_vanilla_right.sh"

num_matches: 15
timeout_secs: 600

declared_reality_assertion: "real_rcssserver"

server_options:
  - "server::synch_mode=true"
  - "server::penalty_shoot_outs=false"
  - "server::nr_extra_halfs=0"

notes:
  - "Balanced eval leg 2/2: improved LEFT, vanilla RIGHT."
  - "Pair with balanced_vanilla_left.yaml (vanilla LEFT, improved RIGHT)."
  - "Combine summary.json from both legs to compute side-corrected mean_goal_diff for improved."

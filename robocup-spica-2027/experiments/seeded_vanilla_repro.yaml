schema_version: "0.1.0"

experiment_id: "seeded_vanilla_repro"
description: >
  Reproducibility check for env drift (Task #42, Phase 9).

  Run Vanilla self-swap (Vanilla LEFT vs Vanilla RIGHT) n=4 with
  player::random_seed=42 pinned. If every match produces the same
  scoreline and same goal-time sequence, we have a deterministic
  axis to control env drift across runs and a viable hard control
  for the Spica325 vs Vanilla comparison.

  If matches still differ, then either (a) the seed doesn't propagate
  to client-side RNG (Cyrus uses its own RNG seeded by wall clock)
  or (b) async scheduling drift dominates, and seed-pinning won't
  help the final balanced eval — in which case env-drift is
  irreducible at this layer.

home_team: "CYRUS_VAN_LL"
away_team: "CYRUS_VAN_RR"

home_start_command: "scripts/team_launchers/_tmp_vanilla_LL_left.sh"
away_start_command: "scripts/team_launchers/_tmp_vanilla_RR_right.sh"

num_matches: 4
timeout_secs: 600

declared_reality_assertion: "real_rcssserver"

server_options:
  - "server::synch_mode=true"
  - "server::penalty_shoot_outs=false"
  - "server::nr_extra_halfs=0"
  - "player::random_seed=42"

notes:
  - "Pinned player::random_seed=42 to test reproducibility."
  - "If all 4 matches are identical, seed propagates -> viable env control."
  - "If matches diverge, async/client-side RNG dominates -> seed irrelevant."

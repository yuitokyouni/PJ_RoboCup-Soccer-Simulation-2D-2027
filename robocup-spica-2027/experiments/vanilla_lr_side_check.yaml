schema_version: "0.1.0"
experiment_id: "vanilla_lr_side_check"
description: "Side-bias check: pure Vanilla on LEFT vs pure Vanilla on RIGHT, N=30. Determines whether Spica's -0.633 vs Vanilla on LEFT comes from real component disadvantage or from Cyrus's documented right-side bias."
home_team: "CYRUS_VANILLA_L"
away_team: "CYRUS_VANILLA_R"
home_start_command: "scripts/team_launchers/cyrus_vanilla_left.sh"
away_start_command: "scripts/team_launchers/cyrus_vanilla_right.sh"
num_matches: 30
timeout_secs: 600
declared_reality_assertion: "real_rcssserver"
server_options:
  - "server::synch_mode=true"
  - "server::penalty_shoot_outs=false"
  - "server::nr_extra_halfs=0"
